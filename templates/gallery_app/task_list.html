{% extends 'base.html'%}
{% block content %}


<div class="container mt-3">
    <div id="carouselExampleSlidesOnly" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <img src="/static/Best.png" alt="Чому ми кращі?" style="height: 200px; width: 400px; display: block; margin: auto;">
          </div>
          <div class="carousel-item">
            <img src="/static/Garanty.png" alt="В нас краща гарантія!" style="height: 200px; width: 400px; display: block; margin: auto;">
          </div>
          <div class="carousel-item">
            <img src="/static/Plus.png" alt="Тръло Ълюс" style="height: 200px; width: 400px; display: block; margin: auto;">
          </div>
        </div>
      </div>
<h2 style='color: rgb(255, 255, 255);'>Список завдань</h2>
<a href="/create_task" class="btn btn-primary mb-3" style='color: rgb(255, 255, 255);'>Додати завдання</a>
<ul class="list-group">
    {% for task in tasks %}
    <li class="list-group-item" style="background-color: rgb(52, 52, 52);">
        <a href="{% url 'task_detail' task.pk %}" style='color: rgb(255, 255, 255);'>{{ task.title }}</a>
        <span class="badge badge-primary">{{ task.status }}</span>
        <span class="badge badge-secondary">{{ task.priority }}</span>
    </li>
    {% empty %}
    <li class="List-group-item">Завданнь не знайдено.</li>
    {% endfor %}
</ul>
</div>
{% endblock %}
